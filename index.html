<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Opening envelope experience for the wedding invitation of Dr. Anand and Dr. Gopika."
    >
    <title>Open The Invitation | Dr. Anand & Dr. Gopika</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Mea+Culpa&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="wedding.css">
  </head>
  <body class="invitation-body opener-body">
    <div class="petal-layer" aria-hidden="true" id="petalLayer"></div>
    <div class="backdrop-illustration" aria-hidden="true"></div>

    <header class="site-header site-header-opener">
      <span class="brand-mark">Dr. Anand &amp; Dr. Gopika</span>
    </header>

    <main class="opener-main">
      <section class="opening-envelope-stage" id="home">
        <div class="opening-shell reveal">
          <p class="eyebrow">Wedding Invitation</p>
          <h1 class="opener-title">Open the invitation</h1>
          <p class="intro-copy opener-copy">
            Tap the envelope and let the card unfold before the celebration begins.
          </p>

          <button type="button" class="envelope-scene" id="openInvitationButton" aria-expanded="false">
            <span class="envelope-shadow opener-shadow" aria-hidden="true"></span>
            <span class="opener-envelope-card">
              <span class="opener-spark opener-spark-one" aria-hidden="true"></span>
              <span class="opener-spark opener-spark-two" aria-hidden="true"></span>
              <span class="opener-spark opener-spark-three" aria-hidden="true"></span>
              <span class="envelope envelope-compact">
                <span class="envelope-letter envelope-letter-compact">
                  <span class="letter-frame letter-frame-compact">
                    <span class="eyebrow eyebrow-compact">Sacred Union</span>
                    <span class="letter-copy letter-copy-compact">
                      <span class="invite-line">Invite you to celebrate their marriage</span>
                      <strong>Dr. Anand</strong>
                      <em>&amp;</em>
                      <strong>Dr. Gopika</strong>
                    </span>
                  </span>
                </span>
                <span class="envelope-lid envelope-lid-compact" aria-hidden="true"></span>
                <span class="envelope-pocket envelope-pocket-compact" aria-hidden="true"></span>
                <span class="opener-dots" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
                <span class="wax-seal wax-seal-compact">Open Invitation</span>
              </span>
            </span>
          </button>

          <a class="skip-link" href="invitation.html">Skip Animation</a>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
