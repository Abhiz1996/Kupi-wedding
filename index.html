<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Opening envelope experience for the wedding invitation of Dr. Anand and Dr. Gopika."
    >
    <title>Open The Invitation | Dr. Anand & Dr. Gopika</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="wedding.css">
  </head>
  <body class="invitation-body opener-body">
    <div class="petal-layer" aria-hidden="true" id="petalLayer"></div>
    <div class="backdrop-illustration" aria-hidden="true"></div>

    <main class="opener-main">
      <section class="opening-envelope-stage" id="home">
        <div class="opening-shell opener-v2 reveal">
          <div class="envelope-v2" aria-hidden="true">
            <span class="envelope-v2__shadow" aria-hidden="true"></span>
            <span class="envelope-v2__body" aria-hidden="true"></span>
            <span class="envelope-v2__letter" aria-hidden="true">
              <span class="envelope-v2__paper">
                <span class="envelope-v2__eyebrow">Wedding Invitation</span>
                <span class="envelope-v2__name">Anand</span>
                <span class="envelope-v2__ampersand">&amp;</span>
                <span class="envelope-v2__name">Gopika</span>
              </span>
            </span>
            <span class="envelope-v2__flap" aria-hidden="true"></span>
            <span class="envelope-v2__front" aria-hidden="true"></span>
            <span class="envelope-v2__front-left" aria-hidden="true"></span>
            <span class="envelope-v2__front-right" aria-hidden="true"></span>
            <span class="envelope-v2__seal" aria-hidden="true">&amp;</span>
          </div>

          <p class="opener-prompt">Tap below to view your invitation</p>
          <button type="button" class="primary-cta opener-button" id="openInvitationCta">
            Open Invitation
          </button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
