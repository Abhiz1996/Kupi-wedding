<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Opening envelope experience for the wedding invitation of Dr. Anand and Dr. Gopika."
    >
    <title>Open The Invitation | Dr. Anand & Dr. Gopika</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="opener.css">
  </head>
  <body class="opener-body">
    <div class="petal-layer" aria-hidden="true" id="petalLayer"></div>
    <div class="backdrop-illustration" aria-hidden="true"></div>

    <main class="opener-main">
      <section class="opening-envelope-stage" id="home">
        <div class="opening-shell reveal">
          <p class="opener-title">Wedding Invitation</p>
          <div class="opener-names" aria-label="Anand and Gopika">
            <strong>Anand</strong>
            <em>&amp;</em>
            <strong>Gopika</strong>
          </div>

          <p class="opener-prompt">Tap below to view your invitation</p>
          <button type="button" class="primary-cta opener-button" id="openInvitationCta">
            Open Invitation
          </button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
