<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Opening envelope experience for the wedding invitation of Dr. Anand and Dr. Gopika."
    >
    <title>Open The Invitation | Dr. Anand & Dr. Gopika</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Mea+Culpa&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="wedding.css">
  </head>
  <body class="invitation-body opener-body">
    <div class="petal-layer" aria-hidden="true" id="petalLayer"></div>
    <div class="backdrop-illustration" aria-hidden="true"></div>

    <header class="site-header site-header-opener">
      <span class="brand-mark">Dr. Anand &amp; Dr. Gopika</span>
    </header>

    <main class="opener-main">
      <section class="opening-envelope-stage" id="home">
        <div class="opening-shell reveal">
          <p class="eyebrow">Sacred Union</p>
          <h1>Open the envelope to begin the celebration.</h1>
          <p class="intro-copy">
            A ceremonial invitation in soft mint, antique gold, and warm ivory. Tap the seal and
            let the invitation unfold before the celebration begins.
          </p>

          <button type="button" class="envelope-scene" id="openInvitationButton" aria-expanded="false">
            <span class="envelope-shadow" aria-hidden="true"></span>
            <span class="envelope">
              <span class="envelope-lid" aria-hidden="true"></span>
              <span class="envelope-letter">
                <span class="letter-frame">
                  <span class="crest" aria-hidden="true">ॐ</span>
                  <span class="letter-copy">
                    <span class="invite-line">Invite you to celebrate their marriage</span>
                    <strong>Dr. Anand</strong>
                    <em>&amp;</em>
                    <strong>Dr. Gopika</strong>
                    <span class="detail-line">Wednesday, the 17th of June, 2026</span>
                    <span class="detail-line">Liya Convention Centre, Kattakada, 10:00 AM</span>
                  </span>
                </span>
              </span>
              <span class="envelope-pocket" aria-hidden="true"></span>
              <span class="wax-seal">Open Invitation</span>
            </span>
          </button>

          <a class="skip-link" href="invitation.html">Skip Animation</a>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
