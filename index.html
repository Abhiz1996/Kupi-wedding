<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Opening envelope experience for the wedding invitation of Dr. Anand and Dr. Gopika."
    >
    <title>Open The Invitation | Dr. Anand & Dr. Gopika</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500;6..96,600&family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Mea+Culpa&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="wedding.css">
  </head>
  <body class="invitation-body opener-body">
    <div class="petal-layer" aria-hidden="true" id="petalLayer"></div>
    <div class="backdrop-illustration" aria-hidden="true"></div>

    <header class="site-header site-header-opener">
      <span class="brand-mark">Dr. Anand &amp; Dr. Gopika</span>
    </header>

    <main class="opener-main">
      <section class="opening-envelope-stage" id="home">
        <div class="opening-shell reveal">
          <button
            type="button"
            class="envelope-scene envelope-scene-reference"
            id="openInvitationButton"
            aria-expanded="false"
          >
            <span class="envelope-shadow opener-shadow" aria-hidden="true"></span>
            <span class="opener-envelope-card">
              <span class="opener-floral opener-floral-one" aria-hidden="true"></span>
              <span class="opener-floral opener-floral-two" aria-hidden="true"></span>
              <span class="opener-floral opener-floral-three" aria-hidden="true"></span>
              <span class="envelope envelope-compact">
                <span class="envelope-letter envelope-letter-compact">
                  <span class="letter-frame letter-frame-compact">
                    <span class="eyebrow eyebrow-compact">Wedding Invitation</span>
                    <span class="letter-copy letter-copy-compact">
                      <span class="invite-line invite-line-compact">
                        Invite you to celebrate their marriage
                      </span>
                      <strong>Dr. Anand</strong>
                      <em>&amp;</em>
                      <strong>Dr. Gopika</strong>
                    </span>
                  </span>
                </span>
                <span class="envelope-lid envelope-lid-compact" aria-hidden="true"></span>
                <span class="envelope-pocket envelope-pocket-compact" aria-hidden="true"></span>
                <span class="amp-badge" aria-hidden="true">&amp;</span>
              </span>
            </span>
          </button>

          <p class="opener-prompt">Tap below to view your invitation</p>
          <button type="button" class="primary-cta opener-button" id="openInvitationCta">
            Open Invitation
          </button>
          <a class="skip-link" href="invitation.html">Skip Animation</a>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
